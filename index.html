<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRDR.5 Discipline</title>
    
    <!-- LINK ICON LOGO (TETAP SAMA) -->
    <link rel="icon" type="image/png" href="https://i.postimg.cc/85PfTQbL/1772296982952.png">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/85PfTQbL/1772296982952.png">

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#020617">

    <style>
        :root {
            --bg: #020617;
            --card: #0f172a;
            --accent: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
            --text: #f8fafc;
            --text-dim: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, system-ui, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body { 
            background: var(--bg); 
            color: var(--text); 
            padding: 20px 16px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container { width: 100%; max-width: 400px; }

        .hero-bal {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            padding: 25px 20px;
            border-radius: 24px;
            text-align: center;
            margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.05);
            position: relative;
        }

        .edit-bal {
            position: absolute;
            right: 20px;
            top: 20px;
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            padding: 5px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
        }

        .label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
        .bal-val { font-size: 32px; font-weight: 800; color: #fff; margin: 5px 0; }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: var(--card);
            padding: 15px;
            border-radius: 18px;
            border: 1px solid rgba(255,255,255,0.05);
            text-align: center;
        }

        .stat-val { font-size: 18px; font-weight: bold; margin-top: 4px; }
        .stat-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; }

        .card {
            background: var(--card);
            padding: 20px;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 20px;
        }

        .progress-container { width: 100%; height: 8px; background: #020617; border-radius: 10px; margin: 15px 0; overflow: hidden; }
        .progress-bar { height: 100%; width: 0%; background: var(--accent); transition: 0.5s; }

        .btn-toggle { display: flex; background: #020617; padding: 4px; border-radius: 14px; margin-bottom: 15px; }
        .tgl { flex: 1; padding: 12px; border: none; border-radius: 11px; font-weight: bold; background: transparent; color: var(--text-dim); cursor: pointer; }
        .tgl.active.win { background: var(--success); color: white; }
        .tgl.active.loss { background: var(--danger); color: white; }

        input, textarea {
            width: 100%; background: #020617; border: 1px solid #1e293b;
            padding: 16px; border-radius: 14px; color: white; margin-bottom: 12px;
            font-size: 16px; outline: none;
        }
        
        input { text-align: center; font-size: 18px; }
        textarea { text-align: left; font-size: 14px; height: 80px; resize: none; }

        .btn-submit {
            width: 100%; background: #fff; color: #000; border: none;
            padding: 18px; border-radius: 14px; font-weight: 800; font-size: 16px;
        }

        .history-title { font-size: 14px; font-weight: bold; margin: 10px 0 10px 5px; color: var(--text-dim); }
        
        .entry-item {
            background: var(--card); padding: 16px; border-radius: 20px;
            margin-bottom: 10px; border-left: 5px solid var(--accent);
            display: flex; flex-direction: column; gap: 8px;
        }

        .entry-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .entry-note { font-size: 12px; color: var(--text-dim); background: rgba(0,0,0,0.2); padding: 8px; border-radius: 10px; font-style: italic; }

        .entry-item.win { border-left-color: var(--success); }
        .entry-item.loss { border-left-color: var(--danger); }

        /* Modal Edit Saldo */
        #modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div id="modal">
        <div class="card" style="width: 100%; max-width: 320px;">
            <div class="label" style="margin-bottom: 15px;">Ubah Saldo Current</div>
            <input type="number" id="new-bal-input" placeholder="1000.00">
            <div style="display: flex; gap: 10px;">
                <button class="btn-submit" style="background: #1e293b; color: white;" onclick="closeModal()">Batal</button>
                <button class="btn-submit" onclick="updateBalanceManually()">Simpan</button>
            </div>
        </div>
    </div>

    <div class="container">
        <!-- Header Balance -->
        <div class="hero-bal">
            <button class="edit-bal" onclick="openModal()">✎ Edit</button>
            <div class="label">Total Saldo Demo</div>
            <div id="bal-txt" class="bal-val">$1.000,00</div>
        </div>

        <!-- Dashboard Statistik -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Win Rate</div>
                <div id="stat-wr" class="stat-val" style="color: var(--success);">0%</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Prof. Factor</div>
                <div id="stat-pf" class="stat-val" style="color: var(--accent);">0.0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Net Profit</div>
                <div id="stat-np" class="stat-val">$0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total Trade</div>
                <div id="stat-tt" class="stat-val">0</div>
            </div>
        </div>

        <!-- Input Section -->
        <div class="card">
            <div style="display: flex; justify-content: space-between; font-weight: bold; font-size: 14px;">
                <span>Disiplin Hari Ini</span>
                <span id="q-txt">0/5</span>
            </div>
            <div class="progress-container"><div id="p-bar" class="progress-bar"></div></div>

            <div id="input-ui">
                <div class="btn-toggle">
                    <button id="w-btn" class="tgl active win" onclick="setType(true)">PROFIT</button>
                    <button id="l-btn" class="tgl" onclick="setType(false)">LOSS</button>
                </div>
                <input type="number" id="amt-in" placeholder="0.00" inputmode="decimal">
                <textarea id="note-in" placeholder="Alasan entry / Evaluasi (Opsional)..."></textarea>
                <button class="btn-submit" onclick="save()">SIMPAN JURNAL</button>
            </div>
            <div id="done-ui" style="display:none; text-align:center; color:var(--success); font-weight:bold; padding:10px;">
                TARGET HARIAN SELESAI! 🧘‍♂️
            </div>
        </div>

        <!-- Journal History -->
        <div class="history-title">RIWAYAT JURNAL</div>
        <div id="logs"></div>

        <button onclick="reset()" style="width:100%; background:none; border:none; color:var(--text-dim); font-size:10px; margin-top:40px; text-decoration:underline; opacity:0.3; padding-bottom: 50px;">RESET DATABASE</button>
    </div>

    <script>
        const DB_KEY = 'tr_v_eval_final';
        let balance = parseFloat(localStorage.getItem(DB_KEY + '_bal') || 1000);
        let allEntries = JSON.parse(localStorage.getItem(DB_KEY + '_all_logs') || '[]');
        let isProfit = true;

        function setType(val) {
            isProfit = val;
            document.getElementById('w-btn').className = val ? 'tgl active win' : 'tgl';
            document.getElementById('l-btn').className = !val ? 'tgl active loss' : 'tgl';
        }

        function openModal() {
            document.getElementById('modal').style.display = 'flex';
            document.getElementById('new-bal-input').value = balance;
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        function updateBalanceManually() {
            const newVal = parseFloat(document.getElementById('new-bal-input').value);
            if (!isNaN(newVal)) {
                balance = newVal;
                localStorage.setItem(DB_KEY + '_bal', balance);
                update();
                closeModal();
            }
        }

        function calculateStats() {
            const total = allEntries.length;
            const wins = allEntries.filter(e => e.win).length;
            const winRate = total > 0 ? (wins / total * 100).toFixed(1) : 0;
            
            let totalProfit = 0, totalLoss = 0;
            allEntries.forEach(e => {
                if (e.val > 0) totalProfit += e.val;
                else totalLoss += Math.abs(e.val);
            });

            const pf = totalLoss > 0 ? (totalProfit / totalLoss).toFixed(2) : totalProfit.toFixed(2);
            const net = totalProfit - totalLoss;

            document.getElementById('stat-wr').innerText = winRate + '%';
            document.getElementById('stat-pf').innerText = pf;
            document.getElementById('stat-tt').innerText = total;
            document.getElementById('stat-np').innerText = (net >= 0 ? '+' : '') + '$' + net.toLocaleString('id-ID', {minimumFractionDigits:2});
            document.getElementById('stat-np').style.color = net >= 0 ? 'var(--success)' : 'var(--danger)';
        }

        function update() {
            document.getElementById('bal-txt').innerText = '$' + balance.toLocaleString('id-ID', {minimumFractionDigits:2});
            const today = new Date().toLocaleDateString('id-ID');
            const todayEntries = allEntries.filter(e => e.date === today);
            
            document.getElementById('q-txt').innerText = todayEntries.length + '/5';
            document.getElementById('p-bar').style.width = (Math.min(todayEntries.length, 5) / 5 * 100) + '%';
            
            document.getElementById('input-ui').style.display = todayEntries.length >= 5 ? 'none' : 'block';
            document.getElementById('done-ui').style.display = todayEntries.length >= 5 ? 'block' : 'none';

            calculateStats();

            const list = document.getElementById('logs');
            list.innerHTML = '';

            if (allEntries.length === 0) {
                list.innerHTML = '<div style="text-align:center; color:var(--text-dim); font-size:12px; padding:20px;">Belum ada jurnal trading.</div>';
            } else {
                [...allEntries].reverse().forEach(e => {
                    const div = document.createElement('div');
                    div.className = `entry-item ${e.win ? 'win' : 'loss'}`;
                    div.innerHTML = `
                        <div class="entry-header">
                            <div>
                                <div style="font-weight:bold; font-size: 14px;">${e.win ? 'Profit Trade' : 'Loss Trade'}</div>
                                <div style="font-size:10px;color:var(--text-dim)">${e.date} • ${e.time}</div>
                            </div>
                            <div style="font-weight:bold; color:${e.win ? 'var(--success)' : 'var(--danger)'}">
                                ${e.win?'+':''}${e.val.toLocaleString('id-ID', {minimumFractionDigits:2})}$
                            </div>
                        </div>
                        ${e.note ? `<div class="entry-note">"${e.note}"</div>` : ''}
                    `;
                    list.appendChild(div);
                });
            }
        }

        function save() {
            const amtInput = document.getElementById('amt-in');
            const noteInput = document.getElementById('note-in');
            const val = parseFloat(amtInput.value);
            const today = new Date().toLocaleDateString('id-ID');
            const todayCount = allEntries.filter(e => e.date === today).length;

            if (!val || todayCount >= 5) return;

            const finalVal = isProfit ? val : -val;
            allEntries.push({ 
                val: finalVal, 
                win: isProfit, 
                note: noteInput.value.trim(),
                date: today,
                time: new Date().toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'}) 
            });

            balance += finalVal;
            localStorage.setItem(DB_KEY + '_bal', balance);
            localStorage.setItem(DB_KEY + '_all_logs', JSON.stringify(allEntries));
            
            amtInput.value = '';
            noteInput.value = '';
            update();
        }

        function reset() { 
            if (confirm('Hapus PERMANEN semua jurnal dan statistik?')) { 
                localStorage.clear(); 
                location.reload(); 
            } 
        }
        
        update();
    </script>
</body>
</html>
